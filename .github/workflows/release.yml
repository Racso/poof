name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          COMMIT_TIME=$(TZ=UTC git log -1 --date=format:'%Y-%m-%dT%H:%M:%SZ' --format=%cd)
          NUMBER=$(echo '${{ github.ref_name }}' | sed 's/^v//')
          go build -ldflags="-s -w -X github.com/racso/poof/version.Number=${NUMBER} -X github.com/racso/poof/version.Commit=${COMMIT} -X github.com/racso/poof/version.CommitTime=${COMMIT_TIME}" -o poof-${{ matrix.os }}-${{ matrix.arch }} .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: poof-${{ matrix.os }}-${{ matrix.arch }}

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image name and version info
        run: |
          echo "IMAGE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/poof" >> $GITHUB_ENV
          echo "NUMBER=$(echo '${{ github.ref_name }}' | sed 's/^v//')" >> $GITHUB_ENV
          echo "COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "COMMIT_TIME=$(TZ=UTC git log -1 --date=format:'%Y-%m-%dT%H:%M:%SZ' --format=%cd)" >> $GITHUB_ENV

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            NUMBER=${{ env.NUMBER }}
            COMMIT=${{ env.COMMIT }}
            COMMIT_TIME=${{ env.COMMIT_TIME }}
          tags: |
            ${{ env.IMAGE }}:${{ github.ref_name }}
            ${{ env.IMAGE }}:latest
