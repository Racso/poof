# [poof-auto-ci] AUTO-GENERATED BY Poof! — CHANGES MAY BE OVERRIDDEN. DISABLE CI ON Poof! TO USE A CUSTOM FILE.
name: Poof! deploy (static, landing)

on:
  push:
    branches: ["main"]
    paths:
      - "landing/**"
permissions:
  contents: read

jobs:
  deploy:
    if: vars.POOF_DISABLE != '1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build static site
        run: |
          docker build -t poof-build -f landing/Dockerfile landing
          docker create --name poof-extract poof-build
          docker cp poof-extract:/poof ./poof-output
          docker rm poof-extract

      - name: Deploy to Poof!
        run: |
          tar -czf site.tar.gz -C ./poof-output .
          curl -fsSL -X POST "${{ secrets.POOF_URL }}/projects/poof/deploy/static" \
            -H "Authorization: Bearer ${{ secrets.POOF_TOKEN }}" \
            -H "Content-Type: application/gzip" \
            --data-binary @site.tar.gz
